<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#03020a; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; position:fixed; top:0; left:0; width:100%; height:100%; }

}

  opacity:0; transform:translateY(12px);

}
#mainText.show { opacity:1; transform:translateY(0); }
#line1 {
  display:block;
  font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif;
  font-size:clamp(14px,4vw,28px); font-weight:300;
  color:#e8e4f8; letter-spacing:0.35em;
}
#line1 rt {
  font-size:0.45em;
  letter-spacing:0.25em;
  color:rgba(232,228,248,0.75);
  font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif;
  position:relative;
  left:-0.2em;
  top:-0.3em;
}
#line2 {
  display:block; font-size:24px; font-weight:300;
  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  color:rgba(180,170,220,0.38); letter-spacing:0.28em;
  margin-top:24px; opacity:0; transition:opacity 7s ease;
}
#line2.show { opacity:1; }
#shogiTitle {
  position:fixed; top:0; left:0; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  z-index:15; pointer-events:none;
  opacity:0; transition: opacity 0.5s ease;
}
#shogiTitle.show  { opacity:1; }
#shogiTitle.hide  { opacity:0; }
#shogiTitleText {
  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  font-size:clamp(14px,1.4vw,14px); font-weight:300;
  color:rgba(180,165,240,0.55); letter-spacing:0.45em;
  text-transform:uppercase;
}
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  z-index:20; display:flex; align-items:center; gap:12px;
}
button {
  background:rgba(120,100,200,0.08);
  border:1px solid rgba(160,140,240,0.30);
  color:rgba(200,190,240,0.7);
  width:36px; height:36px; border-radius:50%;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:14px; transition:all 0.2s;
}
button:hover { background:rgba(120,100,200,0.18); color:#e0d8ff; }
#progWrap { width:120px; height:2px; background:rgba(140,120,220,0.15); border-radius:2px; overflow:hidden; }
#progBar  { height:100%; width:0%; background:rgba(160,130,255,0.7); border-radius:2px; transition:width 0.1s linear; }

<script>
(function(){
document.body.classList.add('intro-active');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize', () => {
  resize();
});
const T_IN=1.4;
const T_EXP=5.0;
const T_FLOW_END=4.2;
const T_FADE=6.0;
const T_TEXT=5.6;
const T_TOTAL=9.5;
const T_FADE_START=3.4;
function easeOut(t){return 1-Math.pow(1-t,3);}
function easeOut2(t){return 1-Math.pow(1-t,2);}
function easeInOut(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
const STARS=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*0.8+0.2,o:Math.random()*0.45+0.1}));
function drawStars(a){for(const s of STARS){ctx.fillStyle=`rgba(220,215,255,${s.o*a})`;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();}}
function drawGrid(cx,cy,cell,n,alpha){if(alpha<0.005||cell<0.5)return;const gw=cell*n,gh=cell*n;const ox=cx-gw/2,oy=cy-gh/2;ctx.fillStyle=`rgba(25,14,65,${alpha*0.18})`;ctx.fillRect(ox,oy,gw,gh);ctx.strokeStyle=`rgba(120,100,200,${alpha*0.42})`;ctx.lineWidth=0.3;for(let i=1;i<n;i++){ctx.beginPath();ctx.moveTo(ox+i*cell,oy);ctx.lineTo(ox+i*cell,oy+gh);ctx.stroke();ctx.beginPath();ctx.moveTo(ox,oy+i*cell);ctx.lineTo(ox+gw,oy+i*cell);ctx.stroke();}ctx.strokeStyle=`rgba(160,138,248,${alpha*0.72})`;ctx.lineWidth=0.55;ctx.strokeRect(ox+0.3,oy+0.3,gw-0.6,gh-0.6);}
function drawLineFlow(cx,cy,cell,n,alpha,elapsed){if(alpha<0.01||cell<0.5)return;const gw=cell*n,gh=cell*n;const ox=cx-gw/2,oy=cy-gh/2;const period=1.2;const phase=(elapsed%period)/period;const tailLen=0.22;const colors=[[180,155,255],[140,200,255],[200,145,255],[155,235,215]];ctx.lineCap='round';for(let i=1;i<n;i++){const linePhase=(phase+i*0.07)%1;const c=colors[i%colors.length];const la=alpha*0.55;const ly=oy+i*cell;const halfW=gw/2;{const head=linePhase;const tail=Math.max(0,head-tailLen);const x0=cx+tail*halfW;const x1=cx+head*halfW;if(x1>x0+0.5){const g=ctx.createLinearGradient(x0,ly,x1,ly);g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0)`);g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},${la})`);ctx.strokeStyle=g;ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(x0,ly);ctx.lineTo(x1,ly);ctx.stroke();const gr=ctx.createRadialGradient(x1,ly,0,x1,ly,3);gr.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},${la*0.9})`);gr.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(x1,ly,3,0,Math.PI*2);ctx.fill();}}{const head=linePhase;const tail=Math.max(0,head-tailLen);const x0=cx-tail*halfW;const x1=cx-head*halfW;if(x0>x1+0.5){const g=ctx.createLinearGradient(x0,ly,x1,ly);g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0)`);g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},${la})`);ctx.strokeStyle=g;ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(x0,ly);ctx.lineTo(x1,ly);ctx.stroke();const gr=ctx.createRadialGradient(x1,ly,0,x1,ly,3);gr.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},${la*0.9})`);gr.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(x1,ly,3,0,Math.PI*2);ctx.fill();}}const lx=ox+i*cell;const halfH=gh/2;const vPhase=(phase+i*0.11)%1;const cv=colors[(i+2)%colors.length];{const head=vPhase;const tail=Math.max(0,head-tailLen);const y0=cy+tail*halfH;const y1=cy+head*halfH;if(y1>y0+0.5){const g=ctx.createLinearGradient(lx,y0,lx,y1);g.addColorStop(0,`rgba(${cv[0]},${cv[1]},${cv[2]},0)`);g.addColorStop(1,`rgba(${cv[0]},${cv[1]},${cv[2]},${la})`);ctx.strokeStyle=g;ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(lx,y0);ctx.lineTo(lx,y1);ctx.stroke();const gr=ctx.createRadialGradient(lx,y1,0,lx,y1,3);gr.addColorStop(0,`rgba(${cv[0]},${cv[1]},${cv[2]},${la*0.9})`);gr.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(lx,y1,3,0,Math.PI*2);ctx.fill();}}{const head=vPhase;const tail=Math.max(0,head-tailLen);const y0=cy-tail*halfH;const y1=cy-head*halfH;if(y0>y1+0.5){const g=ctx.createLinearGradient(lx,y0,lx,y1);g.addColorStop(0,`rgba(${cv[0]},${cv[1]},${cv[2]},0)`);g.addColorStop(1,`rgba(${cv[0]},${cv[1]},${cv[2]},${la})`);ctx.strokeStyle=g;ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(lx,y0);ctx.lineTo(lx,y1);ctx.stroke();const gr=ctx.createRadialGradient(lx,y1,0,lx,y1,3);gr.addColorStop(0,`rgba(${cv[0]},${cv[1]},${cv[2]},${la*0.9})`);gr.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(lx,y1,3,0,Math.PI*2);ctx.fill();}}}}
let pulses=[];function buildPulses(maxRings,coreCell){pulses=[];for(let r=1;r<=maxRings;r++){const targetP=r/maxRings;let lo=0,hi=1,mid=0.5;for(let k=0;k<24;k++){mid=(lo+hi)/2;if(easeInOut(mid)<targetP)lo=mid;else hi=mid;}const t=T_IN+mid*(T_EXP-T_IN);pulses.push({time:t,ringN:r,coreCell});}}
function drawPulse(pulse,elapsed,cx,cy){const age=elapsed-pulse.time;if(age<0)return;const dur=0.55,numRays=5,cell=pulse.coreCell,n=9+pulse.ringN*2,gw=cell*n,gh=cell*n,ox=cx-gw/2,oy=cy-gh/2;const fadeBoard=clamp((T_FADE-elapsed)/(T_FADE-T_FADE_START),0,1);if(fadeBoard<=0)return;const rayColors=[[190,160,255],[140,195,255],[210,160,255],[160,235,220],[230,200,255]];const sides=[{edge:oy,start:ox,len:gw,dir:-1,isH:true},{edge:oy+gh,start:ox,len:gw,dir:+1,isH:true},{edge:ox,start:oy,len:gh,dir:-1,isH:false},{edge:ox+gw,start:oy,len:gh,dir:+1,isH:false}];for(let si=0;si<sides.length;si++){const side=sides[si];for(let ri=0;ri<numRays;ri++){const seed=pulse.ringN*100+si*10+ri;const offset=((seed*137.508)%1)*side.len;const delay=((seed*53.7)%1)*0.18;const rayAge=age-delay;if(rayAge<=0)continue;const prog=clamp(rayAge/dur,0,1);if(prog>=1)continue;const ep=easeOut2(prog);const rayLen=cell*(2.5+((seed*7)%1)*1.8);const dist=ep*rayLen;const alpha=(1-easeOut(prog))*0.85*fadeBoard;if(alpha<0.005)continue;const c=rayColors[(seed*3)%rayColors.length];let x0,y0,x1,y1;if(side.isH){const x=side.start+offset;x0=x;y0=side.edge;x1=x;y1=side.edge+side.dir*dist;}else{const y=side.start+offset;x0=side.edge;y0=y;x1=side.edge+side.dir*dist;y1=y;}const grad=ctx.createLinearGradient(x0,y0,x1,y1);grad.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0)`);grad.addColorStop(0.3,`rgba(${c[0]},${c[1]},${c[2]},${alpha*0.4})`);grad.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},${alpha})`);ctx.strokeStyle=grad;ctx.lineWidth=0.8+((seed*11)%1)*0.6;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();const gr=ctx.createRadialGradient(x1,y1,0,x1,y1,3.5);gr.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},${alpha*0.9})`);gr.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(x1,y1,3.5,0,Math.PI*2);ctx.fill();}}}
let rings=0;

<section class="reveal" id="about">
<div class="section-label">About</div>
<h2>研究の<em>背景</em></h2>
<p class="body-text">
      本研究は Proactive Intelligence をテーマとし、
      予測など未来生成を意思決定に接続する方法の構築が目的です。
      対象は 1D時系列データ、2D視覚表現、3D空間データ など多様な観測情報であり、
      表現学習および潜在状態モデルを統合することで、状態・兆候・予測・介入評価を一体的に扱い、
      より確からしい未来生成を求めます。
    </p>
<div class="data-tags">
<span class="dtag gold">1D — 時系列</span>
<span class="dtag gold">2D — 視覚表現</span>
<span class="dtag gold">3D — 空間データ</span>
</div>
<p class="body-text" style="margin-top:24px;">
      特に、製造業、サプライチェーン、社会インフラといった分野において、
      生成した未来での実運用の改善や<br/>信頼性向上につなげる応用に関心があります。
      これらの研究関心は、製造業・医療を中心とした産業分野における
      実務経験に基づいています。3D CAD・3D画像処理・点群データ、
      ECM/SCMシステムを扱う企業において、業界向けソリューションの
      開発および導入支援に従事し、データ構築支援やDX推進に関わってきました。
       
      現場で直面する予測・判断の課題を背景に、データから未来を推定し、
      意思決定へ結び付ける方法の研究へと発展しています。
    </p>
</section>
<section class="reveal" id="research">
<div class="section-label">Research</div>
<h2>未来設計のための<em>潜在状態モデリング</em></h2>
<p class="body-text">
      本研究では、複雑システムにおける未来生成と意思決定支援を目的として、
      観測データから潜在状態と<br/>ダイナミクスを推定し、
      状態・兆候・予測・介入評価を統合的に扱うモデリング手法を研究しています。
    </p>
</section>

<script>var obs = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.07 });
document.querySelectorAll('.reveal').forEach(function(el) {
  el.classList.add('animate');
  obs.observe(el);
});</script>
<script>
document.querySelectorAll('.nav-links a, .nav-cta').forEach(function(link){
  link.addEventListener('click', function(e){
    var href = this.getAttribute('href');
    if (!href || href.charAt(0) !== '#') return;

    e.preventDefault();

    var target = document.querySelector(href);
    if (!target) return;

    target.scrollIntoView({
      behavior: 'smooth',
      block: 'start'
    });
  });
});
</script>

<script>
var ADMIN_PW='sophia2026akama2';

function ensureResearcherFrameLoaded(){
  var frame=document.getElementById('researcherFrame');
  var tpl=document.getElementById('researcher-template');
  if (!frame.getAttribute('srcdoc')) {
    frame.setAttribute('srcdoc', tpl.innerHTML);
  }
}

document.getElementById('admin-btn').addEventListener('click',function(){
  var modal=document.getElementById('pw-modal');
  var input=document.getElementById('pw-input');
  document.getElementById('pw-error').style.display='none';
  input.value='';
  modal.style.display='flex';
  setTimeout(function(){ input.focus(); }, 30);
});

function closePwModal(){
  document.getElementById('pw-modal').style.display='none';
}

function checkPw(){
  var pwInput=document.getElementById('pw-input');
  var pwError=document.getElementById('pw-error');
  if(pwInput.value===ADMIN_PW){
    ensureResearcherFrameLoaded();
    document.getElementById('pw-modal').style.display='none';
    document.getElementById('admin-btn').classList.remove('show');
    document.getElementById('admin-btn').style.display='none';
    document.getElementById('researcher-shell').style.display='none';
    document.getElementById('researcher-shell').style.opacity='0';
    document.getElementById('researcherPage').style.display='none';
    document.getElementById('researcherPage').style.opacity='0';
    var wrap=document.getElementById('researcherFrameWrap');
    wrap.style.display='block';
    window.scrollTo(0,0);
  } else {
    pwError.style.display='block';
    pwInput.value='';
    pwInput.focus();
  }
}

document.getElementById('pw-modal').addEventListener('click',function(e){
  if(e.target===this) closePwModal();
});
</script>
</body>
